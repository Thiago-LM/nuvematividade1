<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Snake Game</h1>
        </header>
        
        <main class="main-content">
            <div id="game-container">
                <div id="score-container">
                    <h2>Score: <span id="score">0</span></h2>
                </div>
                <div id="game-board"></div>
            </div>
            
            <aside id="leaderboard-container">
                <h2>Leaderboard</h2>
                <ul id="leaderboard-list">
                    <li>Loading scores...</li>
                </ul>
            </aside>
        </main>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Game Over!</h2>
            <p>Your score: <strong><span id="final-score">0</span></strong></p>
            <div class="input-group">
                <label for="nickname">Enter your nickname:</label>
                <input type="text" id="nickname" placeholder="e.g. SnakeKing99" autocomplete="off" maxlength="15">
            </div>
            <div class="button-group">
                <button id="submit-score-btn">Submit Score & Play Again</button>
                <button id="restart-btn" class="secondary-btn">Play Again (No Save)</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
